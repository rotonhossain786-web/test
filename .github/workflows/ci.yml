name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: '18'
    - run: npm install
    - run: npm run lint
    - run: npm test
    - run: npm run build
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: build
        path: ./build

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/download-artifact@v3
      with:
        name: build
        path: ./build
    - name: Deploy to staging
      run: echo "Deploying to staging server..."
    # For full CD, you could run: ssh to server or kubectl apply
